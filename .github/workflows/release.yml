name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
      - name: Package plugin zip
        run: |
          mkdir -p release
          zip -r release/plugin.zip \
            .claude-plugin \
            .cursor-plugin \
            .codex-plugin \
            .codex \
            .opencode \
            .mcp.json \
            skills \
            mcp/lasernexus/dist \
            packages/laser-welding-core/dist \
            packages/laser-welding-core/data \
            packages/laser-welding-core/templates \
            -x "*.DS_Store"
          cd mcp/lasernexus && npm pack --pack-destination ../../release
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release/

  release:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true

  publish-npm:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Skip npm publish when token is unavailable
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "NPM_TOKEN not set; skipping npm publish."
      - uses: actions/checkout@v4
        if: ${{ env.NPM_TOKEN != '' }}
      - uses: actions/setup-node@v4
        if: ${{ env.NPM_TOKEN != '' }}
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
      - run: npm ci
        if: ${{ env.NPM_TOKEN != '' }}
      - run: npm run build
        if: ${{ env.NPM_TOKEN != '' }}
      - name: Publish core
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish -w @ethermeta/lasernexus-core --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
      - name: Publish MCP
        if: ${{ env.NPM_TOKEN != '' }}
        run: npm publish -w @ethermeta/lasernexus --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

  publish-marketplace:
    runs-on: ubuntu-latest
    needs: release
    env:
      SKILLS_MARKETPLACE_TOKEN: ${{ secrets.SKILLS_MARKETPLACE_TOKEN }}
    steps:
      - name: Skip marketplace publish when token is unavailable
        if: ${{ env.SKILLS_MARKETPLACE_TOKEN == '' }}
        run: echo "SKILLS_MARKETPLACE_TOKEN not set; skipping marketplace publish."
      - uses: actions/checkout@v4
        if: ${{ env.SKILLS_MARKETPLACE_TOKEN != '' }}
      - run: chmod +x scripts/publish-marketplace.sh
        if: ${{ env.SKILLS_MARKETPLACE_TOKEN != '' }}
      - run: ./scripts/publish-marketplace.sh
        if: ${{ env.SKILLS_MARKETPLACE_TOKEN != '' }}
        env:
          SKILLS_MARKETPLACE_TOKEN: ${{ env.SKILLS_MARKETPLACE_TOKEN }}
